#base de datos postgres para ApuestasUFC
services:
  postgres:
    image: postgres:16-alpine
    container_name: pronostats-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pronostats_ufc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Guayaquil
    ports:
      - "5438:5432"
    volumes:
      - pronostats_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pronostats_ufc"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pronostats_postgres_data:
