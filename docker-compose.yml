services:
  postgres:
    image: postgres:16-alpine
    container_name: pronostats-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pronostats_ufc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Guayaquil
    ports:
      - "5438:5432"
    volumes:
      - pronostats_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pronostats_ufc"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    container_name: pronostats-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/pronostats_ufc
      JWT_SECRET: cambia-este-jwt-secret
      SECRET_KEY: cambia-esta-clave
      FRONTEND_URL: http://localhost:5173
      API_SPORTS_KEY: ${API_SPORTS_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_xxx}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_xxx}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-pk_test_xxx}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: pronostats-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"

volumes:
  pronostats_postgres_data: